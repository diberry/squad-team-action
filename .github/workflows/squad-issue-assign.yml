name: Squad Issue Assign

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  assign:
    if: startsWith(github.event.label.name, 'squad:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract member name
        id: member
        env:
          LABEL: ${{ github.event.label.name }}
        run: |
          MEMBER="${LABEL#squad:}"
          echo "name=${MEMBER}" >> "$GITHUB_OUTPUT"
          echo "Assigned member: ${MEMBER}"

      - name: Post assignment comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MEMBER: ${{ steps.member.outputs.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          gh issue comment "$ISSUE_NUMBER" --body "### 📋 Squad Assignment

          **${MEMBER}** has been assigned to this issue.

          | Detail | Value |
          |--------|-------|
          | Member | ${MEMBER} |
          | Issue  | #${ISSUE_NUMBER} |
          | Time   | ${TIMESTAMP} |

          Work will begin shortly."

      - name: Check for @copilot auto-assign
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MEMBER: ${{ steps.member.outputs.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Check if copilot-auto-assign is enabled in team.md
          TEAM_FILE=".squad/team.md"
          if [ ! -f "$TEAM_FILE" ]; then
            TEAM_FILE=".ai-team/team.md"
          fi

          if [ -f "$TEAM_FILE" ] && grep -q 'copilot-auto-assign: true' "$TEAM_FILE"; then
            # Only auto-assign @copilot for developer-type roles
            if echo "$MEMBER" | grep -qiE '(developer|dev|coder|engineer)'; then
              echo "Auto-assigning @copilot for developer role: ${MEMBER}"
              gh issue comment "$ISSUE_NUMBER" --body "Assigning @copilot to implement changes for this issue." || true
            fi
          else
            echo "Copilot auto-assign not enabled in team config"
          fi
