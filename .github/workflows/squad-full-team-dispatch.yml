name: Squad Full-Team Dispatch

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  dispatch:
    if: github.event.label.name == 'squad' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Squad CLI
        run: npm install -g @bradygaster/squad-cli

      - name: Set up GitHub Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::notice::COPILOT_TOKEN not set — Copilot CLI will be unavailable. Falling back to label-dispatch mode."
            exit 0
          fi
          echo "$GH_TOKEN" | gh auth login --with-token
          gh extension install github/gh-copilot || true

      - name: Determine issue number
        id: issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=${INPUT_ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${EVENT_ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch issue details
        id: details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          ISSUE_JSON=$(gh issue view "$ISSUE_NUMBER" --json title,body,labels,comments)
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          ISSUE_BODY=$(echo "$ISSUE_JSON" | jq -r '.body // "No description provided"')

          echo "title<<GHEOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          echo "GHEOF" >> "$GITHUB_OUTPUT"

          # Write body to file — avoids multiline GITHUB_OUTPUT issues
          echo "$ISSUE_BODY" > issue-body.txt

      - name: Post processing comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "### 🚀 Squad Full-Team Dispatch

          **Ralph** is spinning up the full squad to work on this issue.

          | Agent | Status |
          |-------|--------|
          | All team members | ⏳ Processing... |

          > This may take a few minutes. Results will be posted below."

      - name: Run Squad full-team dispatch
        id: squad
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.details.outputs.title }}
        run: |
          ISSUE_BODY=$(cat issue-body.txt)

          # Build the prompt for Squad full-team dispatch
          PROMPT="Team, work on issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Issue description:
          ${ISSUE_BODY}

          Each team member should analyze this from their role's perspective and provide:
          1. Their assessment
          2. Recommended actions
          3. Any concerns or risks

          Post your consolidated analysis."

          # TODO: The gh-copilot extension does not support non-interactive piped
          # input. When a batch/programmatic API becomes available, replace this
          # block with the correct invocation. For now, skip straight to fallback.
          # Ref: https://github.com/github/gh-copilot --help
          touch squad-output.txt

          # Fallback: use label-dispatch mode to fan out to individual agents
          if [ ! -s squad-output.txt ]; then
            echo "Using label-dispatch mode — adding squad:{member} labels..."

            TEAM_FILE=".squad/team.md"
            if [ ! -f "$TEAM_FILE" ]; then
              TEAM_FILE=".ai-team/team.md"
            fi

            cat > squad-output.txt << 'DISPATCH_EOF'
          Squad full-team dispatch initiated. Each agent will analyze the issue from their role's perspective.

          **Note:** Running in label-dispatch mode — adding `squad:{member}` labels for each team member. To enable full AI-powered analysis, configure the `COPILOT_TOKEN` secret with a PAT that has Copilot access.
          DISPATCH_EOF

            # Parse team members from the markdown table and add labels
            if [ -f "$TEAM_FILE" ]; then
              grep -E '^\|[^|]+\|[^|]+\|' "$TEAM_FILE" | \
                grep -v -E '(---|Name|Scribe|Ralph)' | \
                awk -F'|' '{print $2}' | \
                sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
                while read -r MEMBER; do
                  if [ -n "$MEMBER" ]; then
                    SLUG=$(echo "$MEMBER" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/^-//;s/-$//')
                    echo "Adding label squad:${SLUG} for ${MEMBER}"
                    # Create label if it doesn't exist, then apply it
                    gh label create "squad:${SLUG}" --color "0E8A16" --description "Squad member: ${MEMBER}" 2>/dev/null || true
                    gh issue edit "$ISSUE_NUMBER" --add-label "squad:${SLUG}" || true
                  fi
                done
            fi
          fi

      - name: Post results comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          RESULTS=$(cat squad-output.txt 2>/dev/null || echo "No output captured")
          gh issue comment "$ISSUE_NUMBER" --body "### ✅ Squad Full-Team Analysis Complete

          ${RESULTS}

          ---
          > 🤖 Processed by Squad Autonomous GitHub Action
          > Workflow run: ${RUN_URL}"
