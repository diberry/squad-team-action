name: Squad Triage

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  triage:
    if: github.event.label.name == 'squad'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch issue details
        id: details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_JSON=$(gh issue view "$ISSUE_NUMBER" --json title,body,labels)
          TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          BODY=$(echo "$ISSUE_JSON" | jq -r '.body // ""')
          COMBINED="${TITLE} ${BODY}"

          # Use EOF delimiter for multiline-safe output
          echo "text<<GHEOF" >> "$GITHUB_OUTPUT"
          echo "$COMBINED" >> "$GITHUB_OUTPUT"
          echo "GHEOF" >> "$GITHUB_OUTPUT"

      - name: Route to team member
        id: route
        env:
          ISSUE_TEXT: ${{ steps.details.outputs.text }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          TEXT_LOWER=$(echo "$ISSUE_TEXT" | tr '[:upper:]' '[:lower:]')
          ROUTED=""

          # Read routing rules from .squad/routing.md patterns
          # Bug/fix/error → Tester
          if echo "$TEXT_LOWER" | grep -qE '(bug|fix|error|crash|regression|broken)'; then
            ROUTED="tester"
          # Security → Reviewer
          elif echo "$TEXT_LOWER" | grep -qE '(security|auth|vulnerability|exploit|cve|permission)'; then
            ROUTED="reviewer"
          # Feature/implement → Developer
          elif echo "$TEXT_LOWER" | grep -qE '(feature|implement|add|create|build|enhance)'; then
            ROUTED="developer"
          # Research/investigate → Researcher
          elif echo "$TEXT_LOWER" | grep -qE '(research|investigate|explore|analyze|study|evaluate)'; then
            ROUTED="researcher"
          # Architecture/design → Lead
          elif echo "$TEXT_LOWER" | grep -qE '(architecture|design|refactor|restructure|migrate|scale)'; then
            ROUTED="lead"
          else
            # Default: escalate to lead
            ROUTED="lead"
          fi

          echo "member=${ROUTED}" >> "$GITHUB_OUTPUT"
          echo "Routed to: ${ROUTED}"

      - name: Apply member label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MEMBER: ${{ steps.route.outputs.member }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Create label if it doesn't exist, then apply it
          gh label create "squad:${MEMBER}" --color "0E8A16" --description "Squad member: ${MEMBER}" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --add-label "squad:${MEMBER}"

      - name: Post triage comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MEMBER: ${{ steps.route.outputs.member }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "### 🏷️ Squad Triage

          This issue has been routed to **${MEMBER}** based on keyword analysis.

          Label \`squad:${MEMBER}\` has been applied."
